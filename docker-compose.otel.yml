# docker-compose.otel.yml — Observability stack for local development
#
# Provides Jaeger (traces), OpenTelemetry Collector, and Grafana.
# Usage: docker compose -f docker-compose.otel.yml up -d
#
# Jaeger UI: http://localhost:16686
# Grafana:   http://localhost:3001
# OTLP gRPC: localhost:4317 (collector)
# OTLP HTTP: localhost:4318 (collector)

services:
  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector — receives spans from both Next.js and Rust
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: brainmate-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/otel/collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics (collector self-monitoring)
    restart: unless-stopped
    depends_on:
      - jaeger

  # ---------------------------------------------------------------------------
  # Jaeger — trace storage and visualization
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: brainmate-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger collector HTTP
      - "14250:14250"  # Jaeger collector gRPC
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana — dashboards and alerting
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.3.1
    container_name: brainmate-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    ports:
      - "3001:3000"  # Grafana UI (3001 to avoid conflict with Next.js)
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  grafana-data:
