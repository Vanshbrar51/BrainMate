# infra/otel/collector-config.yaml — OpenTelemetry Collector configuration
#
# Receives traces via OTLP (gRPC + HTTP), processes them, and exports
# to Jaeger for visualization. In production, replace the Jaeger exporter
# with your backend (Datadog, Grafana Tempo, AWS X-Ray, etc.)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  # Batch spans to reduce export overhead
  batch:
    send_batch_size: 512
    timeout: 5s
    send_batch_max_size: 1024

  # Add memory limiter to prevent OOM
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  # Filter out health check spans to reduce noise
  filter:
    traces:
      span:
        - 'attributes["http.route"] == "/healthz"'
        - 'attributes["http.route"] == "/healthz/live"'
        - 'attributes["http.route"] == "/healthz/ready"'

  # Add resource attributes
  resource:
    attributes:
      - key: deployment.environment
        value: "development"
        action: upsert

exporters:
  # Export to Jaeger via OTLP
  otlp/jaeger:
    endpoint: "jaeger:4317"
    tls:
      insecure: true

  # Debug exporter for development (logs spans to stdout)
  debug:
    verbosity: basic

  # Production: Datadog
  # datadog:
  #   api:
  #     key: ${DD_API_KEY}
  #     site: datadoghq.com

  # Production: Grafana Tempo
  # otlp/tempo:
  #   endpoint: "tempo:4317"
  #   tls:
  #     insecure: true

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/jaeger, debug]
